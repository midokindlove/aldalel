<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع الدليل - MTA San Andreas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-gray-100 font-sans">

    <nav class="bg-gray-800 border-b border-gray-700 p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold text-blue-500 flex items-center gap-2">
                <i class="fas fa-book-open"></i> موقع الدليل
            </a>
            <div class="space-x-4 space-x-reverse">
                <a href="index.html" class="text-blue-400 font-semibold">الرئيسية</a>
                <a href="commands.html" class="hover:text-blue-400 transition">الأوامر</a>
                <a href="rules.html" class="hover:text-blue-400 transition">القوانين</a>
                <a href="intro.html" class="hover:text-blue-400 transition">الإنترو</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-12 max-w-3xl">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold mb-4 text-white">مرحباً بك في <span class="text-blue-500">موقع الدليل</span></h1>
            <p class="text-gray-400">مساعدك الذكي للحصول على أوامر وقوانين لعبة MTA San Andreas فوراً.</p>
        </div>

        <div class="bg-gray-800 rounded-xl shadow-2xl border border-gray-700 overflow-hidden flex flex-col h-[500px]">
            <div class="bg-gray-750 p-4 border-b border-gray-700 flex items-center gap-3">
                <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
                <span class="font-bold text-gray-200">المساعد التلقائي الذكي</span>
            </div>

            <div id="chat-box" class="p-4 flex-1 overflow-y-auto space-y-4 flex flex-col">
                <div class="bg-gray-700 p-3 rounded-lg max-w-[80%] self-start text-sm">
                    أهلاً بك في دليل MTA! اكتب ما تبحث عنه (مثال: طيران، أوامر لاعبين، قانون التخريب) وسأجيبك فوراً.
                </div>
            </div>

            <div class="p-4 bg-gray-850 border-t border-gray-700 flex gap-2">
                <input type="text" id="user-input" placeholder="اكتب سؤالك هنا..." class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500 text-white">
                <button onclick="sendMessage()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg transition">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </main>

    <script>
        // قاعدة بيانات وهمية مدمجة مؤقتاً للرد التلقائي
        const database = {
            commands: [
                { cmd: "/fly", desc: "تفعيل وضع الطيران للاعب المنفذ" },
                { cmd: "/freeze [Player]", desc: "تجميد حركة لاعب معين في السيرفر" },
                { cmd: "/giveweapon", desc: "إعطاء سلاح محدد للاعب" }
            ],
            rules: [
                { rule: "DM (Deathmatch)", desc: "قتل اللاعبين الآخرين بدون سبب آر بي مقنع (ممنوع)" },
                { rule: "Avoid Roleplay", desc: "الخروج من اللعبة أو التهرب أثناء مواقف الآر بي (ممنوع)" }
            ]
        };

        function sendMessage() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const query = input.value.trim().toLowerCase();

            if (!query) return;

            // رسالة المستخدم
            chatBox.innerHTML += `<div class="bg-blue-600 p-3 rounded-lg max-w-[80%] self-end text-sm text-white">${input.value}</div>`;
            input.value = '';

            // معالجة الرد التلقائي
            setTimeout(() => {
                let reply = "عذراً، لم أجد نتائج مطابقة لطلبك. جرب كتابة كلمات مثل 'طيران' أو 'DM'.";
                
                // البحث في الأوامر
                const foundCmd = database.commands.find(c => c.cmd.toLowerCase().includes(query) || c.desc.includes(query));
                // البحث في القوانين
                const foundRule = database.rules.find(r => r.rule.toLowerCase().includes(query) || r.desc.includes(query));

                if (foundCmd) {
                    reply = `💡 <b>أمر مقترح:</b> <code class="bg-black px-1 rounded text-yellow-400">${foundCmd.cmd}</code><br>🔹 <b>الشرح:</b> ${foundCmd.desc}`;
                } else if (foundRule) {
                    reply = `⚖️ <b>قانون مقترح:</b> <span class="text-red-400 font-bold">${foundRule.rule}</span><br>🔹 <b>التفسير بالعربي:</b> ${foundRule.desc}`;
                }

                chatBox.innerHTML += `<div class="bg-gray-700 p-3 rounded-lg max-w-[80%] self-start text-sm">${reply}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 500);
        }
    </script>
</body>
</html>
