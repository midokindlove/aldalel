<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الدليل - MTA Commands</title>
<style>
/* ===== المتغيرات ===== */
:root {
  --primary: #00ff88;
  --primary-dark: #00cc6a;
  --secondary: #00d4ff;
  --danger: #ff4757;
  --bg-darkest: #060918;
  --bg-dark: #0a0e27;
  --bg-card: #141829;
  --text-primary: #ffffff;
  --text-secondary: #a0a8c0;
  --text-muted: #6b7394;
  --border: rgba(0, 255, 136, 0.15);
  --border-strong: rgba(0, 255, 136, 0.4);
  --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.4);
  --shadow-glow: 0 0 20px rgba(0, 255, 136, 0.2);
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --radius-xl: 18px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
  background: linear-gradient(135deg, #060918 0%, #0a0e27 50%, #0d1230 100%);
  color: #ffffff;
  min-height: 100vh;
  direction: rtl;
  line-height: 1.6;
}

.navbar {
  background: rgba(10, 14, 39, 0.95);
  backdrop-filter: blur(10px);
  padding: 1rem 2rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 1000;
  border-bottom: 2px solid #00ff88;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
}

.logo {
  font-size: 1.6rem;
  font-weight: 800;
  color: #00ff88;
  text-shadow: 0 0 15px rgba(0, 255, 136, 0.4);
}

.nav-links {
  display: flex;
  list-style: none;
  gap: 0.5rem;
}

.nav-links a {
  color: #a0a8c0;
  text-decoration: none;
  padding: 0.6rem 1.2rem;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.3s;
  font-weight: 500;
}

.nav-links a:hover {
  color: #00ff88;
  background: rgba(0, 255, 136, 0.08);
}

.nav-links a.active {
  background: #00ff88;
  color: #0a0e27;
  font-weight: 700;
}

.menu-toggle {
  display: none;
  background: none;
  border: none;
  color: #00ff88;
  font-size: 1.5rem;
  cursor: pointer;
}

#app {
  max-width: 1400px;
  margin: 2rem auto;
  padding: 0 2rem;
}

h1 {
  font-size: 2.2rem;
  color: #00ff88;
  margin-bottom: 1rem;
  display: flex;
  align-items: center;
  gap: 0.75rem;
}

h1::before {
  content: '';
  width: 4px;
  height: 32px;
  background: #00ff88;
  border-radius: 2px;
}

.btn {
  background: #00ff88;
  color: #0a0e27;
  border: none;
  padding: 0.7rem 1.5rem;
  border-radius: 10px;
  cursor: pointer;
  font-weight: 700;
  font-size: 0.95rem;
}

.btn:hover { background: #00cc6a; }
.btn-danger { background: #ff4757; color: white; }

input, textarea {
  background: #0a0e27;
  border: 2px solid rgba(0, 255, 136, 0.15);
  color: #fff;
  padding: 0.75rem 1rem;
  border-radius: 10px;
  width: 100%;
  font-size: 0.95rem;
}

input:focus {
  outline: none;
  border-color: #00ff88;
}

.hero-section {
  text-align: center;
  padding: 3rem 1rem;
  background: linear-gradient(135deg, rgba(0, 255, 136, 0.05), rgba(0, 212, 255, 0.05));
  border-radius: 18px;
  border: 1px solid rgba(0, 255, 136, 0.15);
  margin-bottom: 2rem;
}

.hero-section h1 { justify-content: center; font-size: 2.5rem; }
.hero-section h1::before { display: none; }

.hero-section p {
  color: #a0a8c0;
  font-size: 1.1rem;
  max-width: 600px;
  margin: 1rem auto 2rem;
}

.smart-search-box {
  position: relative;
  max-width: 600px;
  margin: 2rem auto;
}

.smart-search-box input {
  width: 100%;
  padding: 1rem 1.5rem;

  border: 2px solid rgba(0, 255, 136, 0.15);
  border-radius: 14px;
  background: #141829;
  color: #fff;
}

.smart-search-box input:focus {
  border-color: #00ff88;
  box-shadow: 0 0 0 3px rgba(0, 255, 136, 0.1);
}

.smart-search-results {
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  margin-top: 0.5rem;
  background: #141829;
  border: 1px solid rgba(0, 255, 136, 0.15);
  border-radius: 14px;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
  max-height: 500px;
  overflow-y: auto;
  z-index: 100;
  display: none;
}

.search-section { border-bottom: 1px solid rgba(0, 255, 136, 0.1); }

}

.search-item:hover { background: rgba(0, 255, 136, 0.05); }

.search-item-icon {
  font-size: 1.3rem;

  height: 40px;

  align-items: center;
  justify-content: center;
  background: rgba(0, 255, 136, 0.1);
  border-radius: 10px;
}

.search-item-content { flex: 1; }

.search-item-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.5rem;
}

.search-command {

  padding: 0.2rem 0.5rem;
  border-radius: 5px;
}

.search-item-desc {
  color: #a0a8c0;
  font-size: 0.85rem;
}

.search-intros-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 0.75rem;
  padding: 1rem;
}

.search-intro-card {
  background: #0a0e27;
  border: 1px solid rgba(0, 255, 136, 0.15);
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
}

.search-intro-card:hover {
  border-color: #00ff88;
  transform: translateY(-2px);
}

.search-intro-card img {
  width: 100%;
  height: 100px;
  object-fit: cover;
}

.search-intro-info { padding: 0.6rem; }
.search-intro-name { color: #00ff88; font-weight: 700; font-size: 0.85rem; }
.search-intro-caption { color: #a0a8c0; font-size: 0.75rem; }

.btn-copy-small {
  background: rgba(0, 255, 136, 0.1);

  color: #00ff88;
  padding: 0.2rem 0.5rem;
  border-radius: 5px;
  font-size: 0.75rem;

  background: #00ff88;

}

  gap: 1.25rem;
}

  padding: 2rem 1.5rem;
  text-align: center;

  transition: all 0.3s;
  text-decoration: none;
  color: inherit;
  display: block;
}

.shortcut-card:hover {
  border-color: #00ff88;
  transform: translateY(-5px);

.section-card {

  padding: 1.25rem 1.5rem;

}

.section-header h3 { margin: 0; color: #00ff88; font-size: 1.2rem; }

.command-row {
  display: flex;

}

.command-row:hover { background: rgba(0, 255, 136, 0.05); }

.command-box {

.command-code {
  font-family: monospace;

.desc-box {

.chat-body {
