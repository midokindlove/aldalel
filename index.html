<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الدليل - أوامر MTA سان أندرياس</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
  <div class="logo">🎮 الدليل</div>
  <ul class="nav-links" id="navLinks">
    <li><a data-page="home" class="active">الرئيسية</a></li>
    <li><a data-page="commands">الأوامر</a></li>
    <li><a data-page="rules">القوانين</a></li>
    <li><a data-page="intros">الانترو</a></li>
    <li><a data-page="chat">الرد التلقائي</a></li>
    <li><a data-page="admin">الإدارة</a></li>
  </ul>
  <button class="menu-toggle" id="menuToggle">☰</button>
</header>

<main id="app"></main>

<button class="float-chat-btn" id="floatChatBtn">💬</button>

<div class="float-chat" id="floatChat">
  <div class="float-chat-header">
    <span>🤖 المساعد</span>
    <button id="floatChatClose">✕</button>
  </div>
  <div class="float-chat-body" id="floatChatBody"></div>
  <div class="float-chat-footer">
    <input type="text" id="floatChatInput" placeholder="اكتب سؤالك...">
    <button id="floatChatSend">➤</button>
  </div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
<script src="admin.js"></script>
</body>
</html>
