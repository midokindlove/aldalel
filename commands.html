<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قسم الأوامر - الدليل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-gray-100 font-sans">
    <nav class="bg-gray-800 border-b border-gray-700 p-4"><div class="container mx-auto flex justify-between items-center"><a href="index.html" class="text-2xl font-bold text-blue-500">موقع الدليل</a><div class="space-x-4 space-x-reverse"><a href="index.html">الرئيسية</a><a href="commands.html" class="text-blue-400">الأوامر</a><a href="rules.html">القوانين</a><a href="intro.html">الإنترو</a></div></div></nav>

    <main class="container mx-auto px-4 py-10 max-w-4xl">
        <h2 class="text-3xl font-bold mb-6 text-center text-white">قائمة أوامر MTA San Andreas</h2>
        
        <input type="text" id="searchCmd" onkeyup="filterCommands()" placeholder="بحث سريع عن أمر..." class="w-full bg-gray-850 border border-gray-700 rounded-lg p-3 mb-6 focus:outline-none focus:border-blue-500">

        <div class="overflow-x-auto bg-gray-800 rounded-xl border border-gray-700">
            <table class="w-full text-right border-collapse" id="cmdTable">
                <thead>
                    <tr class="bg-gray-750 text-blue-400 border-b border-gray-700">
                        <th class="p-4">الأمر (Command)</th>
                        <th class="p-4">الوظيفة والمعنى بالعربي</th>
                        <th class="p-4 text-center">نسخ</th>
                    </tr>
                </thead>
                <tbody>
                    <tr class="border-b border-gray-750 hover:bg-gray-750 transition">
                        <td class="p-4 font-mono text-yellow-400">/setgroup [ID] [Group]</td>
                        <td class="p-4">إعطاء رتبة معينة للاعب داخل السيرفر.</td>
                        <td class="p-4 text-center"><button onclick="navigator.clipboard.writeText('/setgroup')" class="text-gray-400 hover:text-white"><i class="fas fa-copy"></i></button></td>
                    </tr>
                    </tbody>
            </table>
        </div>
    </main>

    <script>
        function filterCommands() {
            let input = document.getElementById('searchCmd').value.toLowerCase();
            let rows = document.querySelectorAll('#cmdTable tbody tr');
            rows.forEach(row => {
                let text = row.innerText.toLowerCase();
                row.style.display = text.includes(input) ? '' : 'none';
            });
        }
    </script>
</body>
</html>
