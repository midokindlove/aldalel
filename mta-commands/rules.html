<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>القوانين - MTA Arabic Server</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="logo">🎮 MTA Arabic</a>
    <ul class="nav-links">
      <li><a href="index.html">الرئيسية</a></li>
      <li><a href="rules.html" class="active">القوانين</a></li>
      <li><a href="commands.html">الأوامر</a></li>
      <li><a href="intros.html">الانترو</a></li>
      <li><a href="admin.html">الإدارة</a></li>
    </ul>
    <a href="#" id="discordLink" class="discord-btn" target="_blank">💬 Discord</a>
  </nav>

  <div class="container">
    <h1 class="page-title">⚖️ قوانين السيرفر</h1>
    <p class="page-subtitle">يرجى قراءة القوانين جيداً قبل اللعب - مخالفتها تعرضك للعقوبة</p>
    
    <div id="rulesContainer" class="loading">
      <div class="spinner"></div>
      <p style="margin-top: 1rem;">جاري تحميل القوانين...</p>
    </div>
  </div>

  <footer class="footer">
    <p>© 2026 MTA Arabic Server - جميع الحقوق محفوظة</p>
  </footer>

  <button class="chat-fab" id="chatFab" title="محادثة مع البوت">💬</button>

  <div class="chat-window" id="chatWindow">
    <div class="chat-header">
      <span>🤖 بوت السيرفر</span>
      <button onclick="toggleChat()" style="background: transparent; border: none; color: var(--bg-dark); font-size: 1.5rem; cursor: pointer;">✕</button>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-area">
      <input type="text" id="chatInput" placeholder="اكتب سؤالك هنا..." onkeypress="if(event.key==='Enter') sendChatMessage()">
      <button onclick="sendChatMessage()">إرسال</button>
    </div>
  </div>

  <script src="js/data-loader.js"></script>
  <script src="js/chatbot.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
